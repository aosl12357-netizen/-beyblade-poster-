<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖產生器</title>
    <!-- 引入 html2canvas 截圖庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 imgly-sdk 去背庫 -->
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/@imgly/background-removal.js"></script>

    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #9c27b0;
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --silver: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --bronze: linear-gradient(135deg, #d4a373 0%, #faedcd 100%);
            --rank-gold-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            --rank-silver-shadow: 0 0 20px rgba(192, 192, 192, 0.7);
            --rank-bronze-shadow: 0 0 20px rgba(205, 127, 50, 0.7);
            --poster-bg: linear-gradient(180deg, #0a0a2a 0%, #000000 100%);
            --showcase-box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 15px rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 320px;
            overflow-y: auto;
            max-height: 95vh;
        }

        .controls h2 {
            margin-top: 0;
            font-size: 20px;
            text-align: center;
        }

        .controls label {
            font-weight: bold;
            font-size: 14px;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }

        .controls input, .controls select {
            width: 100%;
            padding: 8px;
            background: #444;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .file-upload-wrapper {
            margin-bottom: 10px;
            border: 1px dashed #777;
            border-radius: 5px;
            padding: 10px;
            background: #3a3a3a;
        }

        .file-upload-wrapper label {
            color: #ccc;
        }

        button {
            background: #00e5ff;
            color: black;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #00b3cc;
        }

        /* 右側海報預覽區 */
        .poster-container {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        #poster {
            width: 800px;
            height: 1000px;
            background: var(--poster-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 豐富背景特效：霓虹網格、賽博朋克星雲、科技網格、光軌與粒子（透明度 0.25） */
        .grid-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            z-index: 1;
            opacity: 0.25; /* 調低透明度 */
        }
        .bg-fx-nebula {
            position: absolute; top: -100px; left: -100px; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(156, 38, 255, 0.3) 0%, transparent 60%);
            z-index: 1; opacity: 0.25; border-radius: 50%; pointer-events: none;
        }
        .bg-fx-glow-orb {
            position: absolute; right: -100px; bottom: 100px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.2) 0%, transparent 60%);
            z-index: 1; opacity: 0.25; border-radius: 50%; pointer-events: none;
        }
        .bg-fx-light-lines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 80px 80px; z-index: 1; opacity: 0.25;
        }
        .bg-fx-particle-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 10px 10px, 20px 20px; z-index: 1; opacity: 0.25;
        }

        /* 標題 */
        .header-title {
            z-index: 2;
            text-align: center;
            margin-top: 40px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .header-title h1 {
            font-size: 36px;
            margin: 0;
            letter-spacing: 2px;
        }

        .header-title h2 {
            font-size: 42px;
            margin: 5px 0 0 0;
            letter-spacing: 5px;
        }

        /* 主要內容區 */
        .content {
            display: flex;
            width: 95%;
            margin-top: 30px;
            z-index: 2;
            flex: 1;
        }

        .player-img-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 80px;
        }

        /* 核心修正：利用 screen 濾除任何上傳照片的黑邊/黑底 */
        .player-img-wrapper img {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            mix-blend-mode: screen; /* 核心修正：解決崩潰導致的黑框問題 */
        }

        /* 零件展示櫃 */
        .showcase {
            flex: 1.2;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #aaa;
            border-radius: 20px;
            box-shadow: var(--showcase-box-shadow);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            margin-bottom: 80px;
        }

        .showcase-row {
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            gap: 10px;
        }

        .showcase-row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .configuration-tag {
            font-size: 16px;
            font-weight: bold;
            color: #eee;
            letter-spacing: 1px;
        }

        .parts-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
        }

        /* 零件插槽：無框、無圈圈設計 */
        .part-slot {
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .part-slot img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            mix-blend-mode: screen; /* 零件也套用混合模式 */
        }

        /* 底部名牌：覇氣排版金屬名牌 */
        .nameplate {
            position: absolute;
            bottom: 30px;
            width: 420px;
            height: 120px;
            border-radius: 5px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid rgba(255,255,255,0.5);
            color: black;
            overflow: hidden; /* 防止反光條溢出 */
        }

        .nameplate-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* 名牌覇氣大排版 */
        .nameplate-rank {
            font-size: 36px; /* 冠軍字體放大 */
            font-weight: 900;
            letter-spacing: 10px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }
        .nameplate-name {
            font-size: 24px; /* 名字獨立一行 */
            font-weight: bold;
            margin-top: 5px;
            letter-spacing: 4px;
        }

        /* 名牌鎖螺絲：覇氣金屬感 */
        .nameplate::before, .nameplate::after, 
        .nameplate-screws::before, .nameplate-screws::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            background: #ddd;
            border-radius: 50%;
            box-shadow: inset 1px 1px 3px #fff, inset -1px -1px 3px #888;
        }
        .nameplate::before { top: 12px; left: 15px; }
        .nameplate::after { top: 12px; right: 15px; }
        .nameplate-screws { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2;}
        .nameplate-screws::before { bottom: 12px; left: 15px; }
        .nameplate-screws::after { bottom: 12px; right: 15px; }

        /* 名牌反光特效：保留，截圖時正確處理 */
        .nameplate-shine {
            position: absolute; top: -50px; left: -100px; width: 150px; height: 250px;
            background: rgba(255,255,255,0.4);
            transform: rotate(20deg);
            filter: blur(20px);
            z-index: 1; pointer-events: none;
            animation: shine 4s infinite linear;
        }
        @keyframes shine {
            0% { left: -100px; }
            100% { left: 450px; }
        }

        /* 左下角新增自定義圖像槽：「能量核心」儀表盤 */
        .custom-bottom-left-slot {
            position: absolute;
            left: 20px;
            bottom: 20px;
            z-index: 3;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.1);
        }
        /* 能量槽發光邊框 */
        .custom-bottom-left-slot::before {
            content: '';
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            opacity: 0.1;
            filter: blur(5px);
            z-index: 1;
        }
        
        .custom-bottom-left-slot img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            mix-blend-mode: screen; /* 新增槽也套用混合模式 */
            z-index: 2;
        }
        
        /* 槽占位符文字 */
        .custom-slot-placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
        }

        /* 加載指示器樣式 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: var(--neon-blue);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
        }

    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">去背景運算中...</div>

    <!-- 控制面板 -->
    <div class="controls">
        <h2>設定面板</h2>
        
        <label>
            大標題 (屆數部分):
            <input type="text" id="input-edition" value="第一屆" oninput="updateText('edition')">
        </label>
        
        <label>
            名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍 (金色風格)</option>
                <option value="silver">🥈 亞軍 (銀色風格)</option>
                <option value="bronze">🥉 季軍 (銅色風格)</option>
            </select>
        </label>

        <label>
            選手姓名:
            <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')">
        </label>

        <!-- 新增上傳按鈕 -->
        <div class="file-upload-wrapper">
            <label>選手照片 (自動去背景、防崩潰):</label>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'player-img', true)">
        </div>

        <!-- 3組配置上傳 -->
        <div id="upload-sections"></div>

        <!-- 新增左下角槽上傳 -->
        <div class="file-upload-wrapper">
            <label>左下角專屬圖像 (能量槽):</label>
            <input type="file" accept="image/*" onchange="previewImage(event, 'custom-bottom-left-img')">
        </div>

        <button onclick="downloadImage()">下載為圖片 去吧!</button>
    </div>

    <!-- 海報預覽區 -->
    <div class="poster-container">
        <div id="poster">
            <!-- 豐富背景特效層 (透明度 0.25) -->
            <div class="grid-bg"></div>
            <div class="bg-fx-nebula"></div>
            <div class="bg-fx-glow-orb"></div>
            <div class="bg-fx-light-lines"></div>
            <div class="bg-fx-particle-flash"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第一屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <!-- 佔位圖採用 Base64 字符串示例 (透明 PNG) -->
                    <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                </div>
                
                <div class="showcase showcase-gold" id="showcase-box">
                    <!-- 動態生成3組，每組6個零件的展示區 -->
                </div>
            </div>

            <!-- 覇氣排版金屬名牌 -->
            <div class="nameplate rank-gold" id="nameplate-box">
                <div class="nameplate-screws"></div>
                <div class="nameplate-shine"></div>
                <div class="nameplate-title">鬥陣仔 大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

            <!-- 左下角新增自定義圖像槽：「能量核心」 -->
            <div class="custom-bottom-left-slot" id="custom-bottom-left-slot">
                <img id="custom-bottom-left-img" src="" alt="" style="display: none;">
                <div id="custom-slot-placeholder" class="custom-slot-placeholder">能量核心</div>
            </div>
        </div>
    </div>

    <script>
        // 初始化 3組配置，每組 6個零件
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                // 建立上傳區
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <div style="color:#eee; font-weight:bold; margin-bottom:10px;">配置 ${i}</div>
                    <label>盔甲層 (Layer):</label>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'part-conf${i}-layer')">
                    <label>晶片 (Chip):</label>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'part-conf${i}-chip')">
                    <label>性能尖 (Tip):</label>
                    <input type="file" accept="image/*" onchange="previewImage(event, 'part-conf${i}-tip')">
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                // 建立展示區 (無圈圈純零件)
                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot"><img id="part-conf${i}-layer" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Layer 1"></div>
                        <div class="part-slot"><img id="part-conf${i}-chip" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Chip 1"></div>
                        <div class="part-slot"><img id="part-conf${i}-tip" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Tip 1"></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            const showcase = document.getElementById('showcase-box');
            
            // 清除舊顏色
            nameplate.className = "nameplate";
            showcase.className = "showcase";

            // 設定新顏色
            nameplate.classList.add(`rank-${rankSelect.value}`);
            showcase.classList.add(`showcase-${rankSelect.value}`);
            
            // 更新名次文字 (去掉 emoji)
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3); 
            document.getElementById('display-rank').innerText = rankText;
        }

        // 圖片壓縮功能 (避免崩潰退回黑框)
        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', 0.8); // 壓縮品質 0.8
                    };
                };
            });
        }

        async function previewImageAutoBg(event, targetId, isPlayer = false) {
            const loadingOverlay = document.getElementById('loading-overlay');
            const output = document.getElementById(targetId);
            let file = event.target.files[0];

            if (!file) return;

            // 如果是選手大圖，先進行壓縮再送去去背，降低 iPad 崩潰率
            if (isPlayer && file.size > 1024 * 1024) { 
                file = await compressImage(file, 800, 800);
            }

            loadingOverlay.style.display = 'flex';
            
            try {
                // 調用 imglyRemoveBackground API
                const imageBlob = await imglyRemoveBackground(file);
                const url = URL.createObjectURL(imageBlob);
                output.src = url;
                console.log(`去背完成: ${targetId}`);
            } catch (error) {
                console.error("圖片處理失敗:", error);
                // 失敗時使用原圖 (mix-blend-mode 會濾除黑底)
                const reader = new FileReader();
                reader.onload = () => output.src = reader.result;
                reader.readAsDataURL(file);
            } finally {
                // 隱藏加載指示器
                loadingOverlay.style.display = 'none';
            }
        }

        // 一般圖片上傳 (不跑去背、防崩潰，mix-blend-mode 解決黑框)
        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const placeholder = document.getElementById('custom-slot-placeholder');
            const file = event.target.files[0];

            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                output.src = reader.result;
                output.style.display = 'block';
                if (placeholder) placeholder.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }

        // 截圖下載功能 (使用 html2canvas)
        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3); 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            // 加入名牌反光特效動畫的瞬間截圖處理
            const shine = document.querySelector('.nameplate-shine');
            shine.style.animation = 'none'; // 截圖前暫停動畫
            shine.style.display = 'none'; // 截圖時隱藏反光

            html2canvas(poster, {
                scale: 2, // 提高畫質
                useCORS: true, // 支援跨域圖片
                backgroundColor: null // 保持透明背景 (如果有)
            }).then(canvas => {
                shine.style.animation = ''; // 恢復動畫
                shine.style.display = 'block'; // 恢復反光
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png');
                link.click();
                console.log('去去圖生成！');
            });
        }
    </script>
</body>
</html>
