<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖產生器</title>
    <!-- 引入 html2canvas 截圖庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #b026ff;
            --gold: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            --silver: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 100%);
            --bronze: linear-gradient(135deg, #cd7f32 0%, #8b4513 100%);
            --poster-bg: #03030c; /* 純淨深色底圖 */
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1;
            background: #1e1e24;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 350px;
            overflow-y: auto;
            max-height: 95vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--neon-blue); }
        .controls label { font-weight: bold; font-size: 13px; color: #ccc; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #444; border-radius: 8px; padding: 15px; background: #22222a; margin-bottom: 10px; }
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #1a1a20; padding: 8px; border-radius: 6px; border: 1px dashed #555;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 4px; color: #aaa;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }

        button { background: #00e5ff; color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px;}
        button:hover { background: #00b3cc; }

        /* 右側海報預覽區 */
        .poster-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; }
        
        /* 海報主體（底圖） */
        #poster { width: 1000px; height: 1100px; background: var(--poster-bg); position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* 帥氣背景特效（低透明度 0.25，與底圖分離） */
        .cool-background-fx { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.15) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 229, 255, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 50% 30%, rgba(176, 38, 255, 0.4) 0%, transparent 70%); 
            background-size: 50px 50px, 50px 50px, 100% 100%;
            opacity: 0.25; /* 照您要求：調低透明度，帥氣又不搶戲 */
            z-index: 1; pointer-events: none;
        }

        /* 標題 */
        .header-title { z-index: 2; text-align: center; margin-top: 50px; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .header-title h1 { font-size: 38px; margin: 0; letter-spacing: 4px; font-weight: 300; }
        .header-title h2 { font-size: 48px; margin: 10px 0 0 0; letter-spacing: 8px; font-weight: 900; background: linear-gradient(to bottom, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}

        /* 主要內容佈局 */
        .content { display: flex; width: 92%; margin-top: 50px; z-index: 2; flex: 1; gap: 30px; }
        
        /* 人物影像外殼 */
        .player-img-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 150px; z-index: 3; }
        /* 核心修正：利用 screen 濾除任何上傳照片的黑邊/黑底，保證不當掉、無黑框 */
        .player-img-wrapper img { max-width: 130%; max-height: 800px; object-fit: contain; mix-blend-mode: screen; z-index: 2;}

        /* 科技透視展示櫃 */
        .showcase { 
            flex: 1.3; background: rgba(10, 10, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column; padding: 25px; gap: 20px; margin-bottom: 160px; z-index: 3; 
        }

        .showcase-row { 
            display: flex; flex-direction: column; border-radius: 12px; 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px; 
        }
        
        .showcase-row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 8px; margin-bottom: 12px; }
        .configuration-tag { font-size: 15px; font-weight: 900; color: #fff; letter-spacing: 2px; }
        
        /* 6個零件的橫向排列 */
        .parts-container { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px;}
        
        /* 核心修正：拔除所有圈圈與圓形基座，只保留純粹、乾淨的圖片放置位 */
        .part-slot { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; position: relative; }
        /* 零件同樣套用 screen 混合模式，上傳帶黑底的零件圖也會自動變透明浮貼 */
        .part-slot img { max-height: 100%; max-width: 100%; object-fit: contain; mix-blend-mode: screen; z-index: 2; }

        /* 質感金屬名牌 */
        .nameplate {
            position: absolute; bottom: 40px; width: 480px; height: 130px; border-radius: 8px; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #111; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.7);
        }

        /* 鎖螺絲點綴 */
        .nameplate::before, .nameplate::after, 
        .nameplate-screws::before, .nameplate-screws::after {
            content: ''; position: absolute; width: 12px; height: 12px; background: #ccc; border-radius: 50%;
            box-shadow: inset 1px 1px 3px #fff, inset -1px -1px 3px #666;
        }
        .nameplate::before { top: 12px; left: 15px; }
        .nameplate::after { top: 12px; right: 15px; }
        .nameplate-screws { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2;}
        .nameplate-screws::before { bottom: 12px; left: 15px; }
        .nameplate-screws::after { bottom: 12px; right: 15px; }

        .nameplate-title { font-size: 16px; font-weight: 900; margin-bottom: 2px; letter-spacing: 2px; opacity: 0.8;}
        .nameplate-rank { font-size: 42px; font-weight: 900; letter-spacing: 10px; line-height: 1.1; }
        .nameplate-name { font-size: 24px; font-weight: 900; margin-top: 2px; letter-spacing: 4px; }

        /* 名次色彩切換 */
        .rank-gold { background: var(--gold); border-color: #fffdf0; }
        .rank-silver { background: var(--silver); border-color: #ffffff; }
        .rank-bronze { background: var(--bronze); border-color: #ffeedd; }
        
        .showcase-gold { border-color: rgba(255, 215, 0, 0.4); }
        .showcase-silver { border-color: rgba(192, 192, 192, 0.4); }
        .showcase-bronze { border-color: rgba(205, 127, 50, 0.4); }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div class="controls">
        <h2>榮耀圖設定</h2>
        
        <label>大標題 (屆數): <input type="text" id="input-edition" value="第一屆" oninput="updateText('edition')"></label>
        
        <label>名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍</option>
                <option value="silver">🥈 亞軍</option>
                <option value="bronze">🥉 季軍</option>
            </select>
        </label>

        <label>選手姓名: <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')"></label>

        <div class="file-upload-wrapper">
            <h4>👤 選手照片 (帶黑背景亦可自動透明)</h4>
            <input type="file" accept="image/*" onchange="previewImage(event, 'player-img')">
        </div>

        <!-- 3組配置上傳 -->
        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載為高畫質圖片</button>
    </div>

    <!-- 海報預覽區 -->
    <div class="poster-container">
        <div id="poster">
            <!-- 帥氣低透明度背景與主底圖分離 -->
            <div class="cool-background-fx"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第一屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <img id="player-img" src="https://via.placeholder.com/600x800/000/000.png" alt="選手">
                </div>
                
                <div class="showcase showcase-gold" id="showcase-box">
                    <!-- 動態生成3組配置，無圈圈純零件展示 -->
                </div>
            </div>

            <!-- 立體金屬名牌 -->
            <div class="nameplate rank-gold" id="nameplate-box">
                <div class="nameplate-screws"></div>
                <div class="nameplate-title">鬥陣仔 大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

        </div>
    </div>

    <script>
        // 初始化 3組配置，每組 6個零件
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>零件 1</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p1')"></div>
                        <div><label>零件 2</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p2')"></div>
                        <div><label>零件 3</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p3')"></div>
                        <div><label>零件 4</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p4')"></div>
                        <div><label>零件 5</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p5')"></div>
                        <div><label>零件 6</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p6')"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="1"></div>
                        <div class="part-slot"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="2"></div>
                        <div class="part-slot"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="3"></div>
                        <div class="part-slot"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="4"></div>
                        <div class="part-slot"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="5"></div>
                        <div class="part-slot"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="6"></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            const showcase = document.getElementById('showcase-box');
            
            nameplate.className = "nameplate";
            showcase.className = "showcase";

            nameplate.classList.add(`rank-${rankSelect.value}`);
            showcase.classList.add(`showcase-${rankSelect.value}`);
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(2); 
            document.getElementById('display-rank').innerText = rankText;
        }

        // 核心修正：乾淨純粹的圖片上傳（不跑會當掉的去背，改用圖層混合模式）
        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => output.src = reader.result;
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(2); 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            html2canvas(poster, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#03030c' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 0.95);
                link.click();
            });
        }
    </script>
</body>
</html>
