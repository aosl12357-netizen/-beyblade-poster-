<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-dark: #050a15;
            --gold-light: #fff2a8;
            --gold-main: #ffd700;
            --gold-dark: #b8860b;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1; background: #1e1e24; padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px; max-width: 350px;
            overflow-y: auto; max-height: 95vh; border: 1px solid #444;
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--gold-main); }
        .controls label { font-weight: bold; font-size: 13px; color: #ccc; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #2a2a35; border: 1px solid #555; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #555; border-radius: 8px; padding: 15px; background: #22222a; margin-bottom: 10px; border-left: 4px solid var(--gold-main);}
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #111; padding: 8px; border-radius: 6px; border: 1px dashed #666;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 4px; color: #bbb;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }

        button { background: linear-gradient(135deg, var(--gold-light), var(--gold-dark)); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,215,0,0.4);}
        button:hover { filter: brightness(1.2); }

        /* 右側海報預覽區 */
        .poster-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; }
        
        #poster { 
            width: 1000px; height: 1100px; 
            background: radial-gradient(circle at 50% 20%, #112244 0%, var(--bg-dark) 100%); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,1); border: 2px solid var(--gold-dark);
        }

        /* 華麗背景光暈 */
        .poster-fx {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            z-index: 1; pointer-events: none;
        }

        /* 標題 */
        .header-title { z-index: 2; text-align: center; margin-top: 50px; text-shadow: 0 5px 15px rgba(0,0,0,0.9); }
        .header-title h1 { font-size: 38px; margin: 0; letter-spacing: 4px; font-weight: 900; color: #fff; }
        .header-title h2 { 
            font-size: 52px; margin: 10px 0 0 0; letter-spacing: 8px; font-weight: 900; 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
        }

        .content { display: flex; width: 92%; margin-top: 30px; z-index: 2; flex: 1; gap: 40px; }
        
        /* 人物影像 - 移除了害你變黑框的語法 */
        .player-img-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 180px; z-index: 3; }
        .player-img-wrapper img { max-width: 140%; max-height: 850px; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8)); z-index: 2; }

        /* 展示櫃 */
        .showcase { 
            flex: 1.2; background: rgba(5, 10, 21, 0.6); border: 2px solid rgba(212, 175, 55, 0.4); 
            border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; padding: 25px; gap: 20px; margin-bottom: 180px; z-index: 3; 
        }

        .showcase-row { 
            display: flex; flex-direction: column; border-radius: 8px; 
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-left: 4px solid var(--gold-main); padding: 15px; 
        }
        
        .showcase-row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 8px; margin-bottom: 12px; }
        .configuration-tag { font-size: 18px; font-weight: 900; color: var(--gold-light); letter-spacing: 2px; }
        
        /* 零件 - 完全無圈圈 */
        .parts-container { display: flex; justify-content: space-around; align-items: center; width: 100%; gap: 10px;}
        .part-slot { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; position: relative; }
        .part-slot img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); z-index: 2; }

        /* 名牌 - 字體放大、獨立名字 */
        .nameplate {
            position: absolute; bottom: 40px; width: 550px; height: 160px; border-radius: 12px; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-dark) 100%);
            color: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.9); border: 3px solid #fff;
        }

        .nameplate-title { font-size: 18px; font-weight: 900; margin-bottom: 2px; letter-spacing: 3px; color: #222;}
        .nameplate-rank { font-size: 52px; font-weight: 900; letter-spacing: 12px; line-height: 1.1; color: #000; text-shadow: 2px 2px 0px rgba(255,255,255,0.5);}
        .nameplate-name { font-size: 28px; font-weight: 900; margin-top: 8px; letter-spacing: 5px; color: #111;}

        /* 左下角：專屬圖案插槽 */
        .custom-bottom-left-slot {
            position: absolute; left: 30px; bottom: 30px; z-index: 8;
            width: 220px; height: 220px; display: flex; justify-content: center; align-items: center;
        }
        .custom-bottom-left-slot img { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)); }
    </style>
</head>
<body>

    <div class="controls">
        <h2>榮耀圖設定</h2>
        
        <label>大標題 (屆數): <input type="text" id="input-edition" value="第三屆" oninput="updateText('edition')"></label>
        
        <label>名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍</option>
                <option value="silver">🥈 亞軍</option>
                <option value="bronze">🥉 季軍</option>
            </select>
        </label>

        <label>選手姓名: <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')"></label>

        <div class="file-upload-wrapper">
            <h4>👤 選手去背照片</h4>
            <label style="color: #ffea7c; font-size: 12px;">※ 請直接上傳拷貝好的透明PNG，保證無黑框</label>
            <input type="file" accept="image/*" onchange="previewImage(event, 'player-img')">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 左下角專屬圖片</h4>
            <label style="color: #ffea7c; font-size: 12px;">※ 這裡很乾淨，上傳圖片直接貼上去</label>
            <input type="file" accept="image/*" onchange="previewImage(event, 'custom-bottom-left-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載高畫質圖片</button>
    </div>

    <div class="poster-container">
        <div id="poster">
            <div class="poster-fx"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第三屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                </div>
                
                <div class="showcase" id="showcase-box">
                    <!-- 動態生成 -->
                </div>
            </div>

            <div class="nameplate" id="nameplate-box">
                <div class="nameplate-title">門陣仔 - 榮耀大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

            <div class="custom-bottom-left-slot" id="custom-bottom-left-slot">
                <img id="custom-bottom-left-img" src="" alt="" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>零件 1</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p1')"></div>
                        <div><label>零件 2</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p2')"></div>
                        <div><label>零件 3</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p3')"></div>
                        <div><label>零件 4</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p4')"></div>
                        <div><label>零件 5</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p5')"></div>
                        <div><label>零件 6</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p6')"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            document.getElementById('display-rank').innerText = rankText;

            if (rankSelect.value === 'gold') {
                nameplate.style.background = 'linear-gradient(135deg, var(--gold-light) 0%, var(--gold-dark) 100%)';
                nameplate.style.color = '#000';
            } else if (rankSelect.value === 'silver') {
                nameplate.style.background = 'linear-gradient(135deg, #ffffff 0%, #9e9e9e 100%)';
                nameplate.style.color = '#000';
            } else {
                nameplate.style.background = 'linear-gradient(135deg, #e3a268 0%, #8b4513 100%)';
                nameplate.style.color = '#fff';
            }
        }

        // 最純粹的圖片讀取，不跑任何花俏的濾鏡，保證透明去背圖原汁原味呈現
        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            html2canvas(poster, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#050a15' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
