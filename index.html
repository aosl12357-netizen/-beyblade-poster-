<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            /* 極致華麗帥氣配色 */
            --bg-base: #030712;
            --gold-light: #fef08a;
            --gold-main: #eab308;
            --gold-dark: #a16207;
            --cyan-glow: #06b6d4;
            --accent-glow: rgba(234, 179, 8, 0.6);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1; background: #111827; padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px; max-width: 350px;
            overflow-y: auto; max-height: 95vh; border: 1px solid #374151;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--gold-main); text-shadow: 0 0 10px var(--accent-glow); }
        .controls label { font-weight: bold; font-size: 13px; color: #d1d5db; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #4b5563; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #374151; border-radius: 8px; padding: 15px; background: #1f2937; margin-bottom: 10px; border-left: 4px solid var(--gold-main);}
        .file-upload-wrapper.epic-bg { border-left: 4px solid var(--cyan-glow); background: #164e63; border-color: #0891b2; }
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #4b5563; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #111827; padding: 8px; border-radius: 6px; border: 1px dashed #4b5563;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 4px; color: #9ca3af;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }

        button { background: linear-gradient(135deg, var(--gold-light), var(--gold-dark)); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 5px 15px var(--accent-glow);}
        button:hover { filter: brightness(1.2); transform: translateY(-2px); transition: 0.2s;}

        /* 右側海報預覽區 */
        .poster-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; }
        
        #poster { 
            width: 1000px; height: 1100px; 
            background-color: var(--bg-base); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,1); 
            border: 4px solid var(--gold-dark);
            outline: 2px solid var(--gold-light); outline-offset: -8px;
        }

        /* 🌌 核心亮點：超帥中間底圖層 */
        .epic-bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://via.placeholder.com/1000x1100/030712/030712.png'); /* 預設純黑底 */
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0.8;
            /* 電影級底部漸層淡出，讓下面的名牌跟零件依然清晰 */
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 45%, rgba(0,0,0,0) 95%);
        }

        /* 輔助特效層：增加整體華麗感 */
        .poster-fx-rays {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.03) 0deg, transparent 10deg, rgba(255,255,255,0.03) 20deg);
            z-index: 2; pointer-events: none; mix-blend-mode: screen; opacity: 0.6;
        }

        /* 標題 */
        .header-title { z-index: 3; text-align: center; margin-top: 45px; text-shadow: 0 10px 20px rgba(0,0,0,1); }
        .header-title h1 { 
            font-size: 42px; margin: 0; letter-spacing: 6px; font-weight: 900; 
            color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.6);
        }
        .header-title h2 { 
            font-size: 60px; margin: 0px 0 0 0; letter-spacing: 12px; font-weight: 900; 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-main), var(--gold-dark)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .content { display: flex; width: 94%; margin-top: 10px; z-index: 4; flex: 1; gap: 40px; }
        
        /* 人物影像 - 加上「發光氣場」掩護去背瑕疵 */
        .player-img-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 200px; position: relative; }
        .player-img-wrapper img { 
            max-width: 140%; max-height: 850px; object-fit: contain; z-index: 5;
            /* 雙重陰影：第一層金色發光掩護毛邊，第二層黑色陰影增加立體感 */
            filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.4)) drop-shadow(0 20px 40px rgba(0,0,0,0.9)); 
        }

        /* 科技競技展示櫃 */
        .showcase { 
            flex: 1.2; background: rgba(3, 7, 18, 0.85); border: 2px solid var(--gold-main); 
            border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 0 40px rgba(234, 179, 8, 0.15); 
            display: flex; flex-direction: column; padding: 25px; gap: 18px; margin-bottom: 180px; 
            position: relative; backdrop-filter: blur(10px);
        }
        /* 展示櫃四角高科技裝飾 */
        .showcase::before, .showcase::after {
            content: ''; position: absolute; width: 25px; height: 25px; border: 3px solid var(--gold-light);
        }
        .showcase::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .showcase::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .showcase-row { 
            display: flex; flex-direction: column; border-radius: 8px; 
            background: linear-gradient(90deg, rgba(234, 179, 8, 0.1) 0%, transparent 100%);
            border-left: 5px solid var(--gold-main); padding: 15px; 
        }
        
        .showcase-row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(234, 179, 8, 0.3); padding-bottom: 8px; margin-bottom: 15px; }
        .configuration-tag { font-size: 20px; font-weight: 900; color: var(--gold-light); letter-spacing: 3px; text-shadow: 0 2px 5px #000; }
        
        /* 零件 - 華麗無框排列 */
        .parts-container { display: flex; justify-content: space-around; align-items: center; width: 100%; gap: 10px;}
        .part-slot { width: 85px; height: 85px; display: flex; justify-content: center; align-items: center; position: relative; }
        .part-slot img { max-height: 100%; max-width: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9)); z-index: 2; }

        /* 霸氣皇家名牌 */
        .nameplate {
            position: absolute; bottom: 40px; width: 600px; height: 160px; border-radius: 12px; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(180deg, #fef08a 0%, #eab308 50%, #a16207 100%);
            color: #000; box-shadow: 0 25px 50px rgba(0,0,0,1), inset 0 0 15px rgba(255,255,255,0.6);
            border: 4px solid #fff2a8;
        }

        .nameplate-title { font-size: 20px; font-weight: 900; margin-bottom: 5px; letter-spacing: 4px; color: #332200;}
        .nameplate-rank { font-size: 55px; font-weight: 900; letter-spacing: 15px; line-height: 1; color: #000; text-shadow: 2px 3px 0px rgba(255,255,255,0.6);}
        .nameplate-name { font-size: 28px; font-weight: 900; margin-top: 8px; letter-spacing: 6px; color: #111;}

        /* 左下角專屬插槽 */
        .custom-bottom-left-slot {
            position: absolute; left: 40px; bottom: 40px; z-index: 9;
            width: 250px; height: 250px; display: flex; justify-content: center; align-items: center;
        }
        .custom-bottom-left-slot img { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9)); }
    </style>
</head>
<body>

    <div class="controls">
        <h2>榮耀大賽設定</h2>
        
        <label>大標題 (屆數): <input type="text" id="input-edition" value="第三屆" oninput="updateText('edition')"></label>
        
        <label>名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍</option>
                <option value="silver">🥈 亞軍</option>
                <option value="bronze">🥉 季軍</option>
            </select>
        </label>

        <label>選手姓名: <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')"></label>

        <div class="file-upload-wrapper epic-bg">
            <h4>🌌 中間帥氣底圖</h4>
            <label style="color: #67e8f9; font-size: 12px;">※ 上傳神龍、競技場、星空等超帥圖片，自動墊在背後</label>
            <input type="file" accept="image/*" onchange="previewEpicBg(event)">
        </div>

        <div class="file-upload-wrapper">
            <h4>👤 選手去背照片</h4>
            <label style="color: #fef08a; font-size: 12px;">※ 已自動加上「發光氣場」，邊緣去不乾淨也看不出來！</label>
            <input type="file" accept="image/*" onchange="previewImage(event, 'player-img')">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 左下角專屬圖片</h4>
            <input type="file" accept="image/*" onchange="previewImage(event, 'custom-bottom-left-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載極致華麗圖片</button>
    </div>

    <div class="poster-container">
        <div id="poster">
            <div class="epic-bg-layer" id="epic-bg-layer"></div>
            <div class="poster-fx-rays"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第三屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                </div>
                
                <div class="showcase" id="showcase-box">
                    </div>
            </div>

            <div class="nameplate" id="nameplate-box">
                <div class="nameplate-title">門陣仔 - 榮耀大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

            <div class="custom-bottom-left-slot" id="custom-bottom-left-slot">
                <img id="custom-bottom-left-img" src="" alt="" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>零件 1</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p1')"></div>
                        <div><label>零件 2</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p2')"></div>
                        <div><label>零件 3</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p3')"></div>
                        <div><label>零件 4</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p4')"></div>
                        <div><label>零件 5</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p5')"></div>
                        <div><label>零件 6</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p6')"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-slot"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            document.getElementById('display-rank').innerText = rankText;

            if (rankSelect.value === 'gold') {
                nameplate.style.background = 'linear-gradient(180deg, #fef08a 0%, #eab308 50%, #a16207 100%)';
                nameplate.style.color = '#000';
            } else if (rankSelect.value === 'silver') {
                nameplate.style.background = 'linear-gradient(180deg, #ffffff 0%, #a8a8a8 50%, #707070 100%)';
                nameplate.style.color = '#000';
            } else {
                nameplate.style.background = 'linear-gradient(180deg, #ffb380 0%, #cd7f32 50%, #8b4513 100%)';
                nameplate.style.color = '#fff';
            }
        }

        // 處理中間帥氣底圖的讀取
        function previewEpicBg(event) {
            const epicBgLayer = document.getElementById('epic-bg-layer');
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                // 將讀取到的圖片設為背景
                epicBgLayer.style.backgroundImage = 'url(' + reader.result + ')';
            }
            reader.readAsDataURL(file);
        }

        // 一般透明圖片讀取
        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            html2canvas(poster, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#030712' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
