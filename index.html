<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            /* 華麗金屬配色 */
            --gold-light: #fffbc2;
            --gold-main: #ffc400;
            --gold-dark: #b37700;
            
            --silver-light: #f0f0f0;
            --silver-main: #a8a8a8;
            --silver-dark: #444444;

            --bronze-light: #ffcba4;
            --bronze-main: #b87333; /* 偏紅銅色，與黃金區隔 */
            --bronze-dark: #5c3317;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #0d0d0d;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1; background: #111827; padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 15px; max-width: 380px; /* 稍微加寬容納文字輸入 */
            overflow-y: auto; max-height: 95vh; border: 1px solid #374151;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--gold-main); text-shadow: 0 0 15px rgba(255, 196, 0, 0.5);}
        .controls label { font-weight: bold; font-size: 13px; color: #d1d5db; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #1f2937; border: 1px solid #4b5563; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #374151; border-radius: 8px; padding: 15px; background: #1f2937; margin-bottom: 10px; border-left: 4px solid var(--gold-main);}
        .file-upload-wrapper.epic-bg { border-left: 4px solid #06b6d4; background: #164e63; border-color: #0891b2; }
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #4b5563; padding-bottom: 5px;}
        
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #111827; padding: 8px; border-radius: 6px; border: 1px dashed #4b5563; display: flex; flex-direction: column; gap: 5px;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 0; color: #9ca3af;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }
        .parts-grid-inputs input[type="text"] { width: 100%; font-size: 12px; padding: 4px; background: #000; border: 1px solid #555; margin:0;}

        button { background: linear-gradient(135deg, var(--gold-light), var(--gold-dark)); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 10px; box-shadow: 0 5px 20px rgba(255, 196, 0, 0.4);}
        button:hover { filter: brightness(1.2); transform: translateY(-2px); transition: 0.2s;}

        /* 右側海報預覽區 */
        .poster-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; }
        
        #poster { 
            width: 1000px; height: 1100px; 
            background-color: #030712; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,1); 
            border: 4px solid var(--gold-dark);
            outline: 2px solid var(--gold-light); outline-offset: -8px;
            transition: all 0.5s ease;
        }

        /* 🌌 內建全自動神級底圖層 */
        .epic-bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 1; transition: all 0.5s ease;
        }
        /* 🏆 冠軍背景：帝王金黃 */
        .bg-gold-theme { background: radial-gradient(circle at 50% 40%, #5a3800 0%, #0a0600 80%); }
        /* 🥈 亞軍背景：深海科技藍 */
        .bg-silver-theme { background: radial-gradient(circle at 50% 40%, #002b5e 0%, #000812 80%); }
        /* 🥉 季軍背景：赤煉紅銅 (明顯偏紅/深咖啡) */
        .bg-bronze-theme { background: radial-gradient(circle at 50% 40%, #4a1500 0%, #0f0400 80%); }

        /* 華麗輔助網格特效層 */
        .poster-fx-rays {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,0.03) 0deg, transparent 10deg, rgba(255,255,255,0.03) 20deg),
                        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            z-index: 2; pointer-events: none; mix-blend-mode: screen; opacity: 0.7;
        }

        /* 自訂帥氣底圖容器 */
        .custom-bg-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3; opacity: 0.6; pointer-events: none;
            background-size: cover; background-position: center;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 90%);
        }

        /* 標題 (極強發光感) */
        .header-title { z-index: 5; text-align: center; margin-top: 40px; text-shadow: 0 10px 20px rgba(0,0,0,1); }
        .header-title h1 { font-size: 42px; margin: 0; letter-spacing: 6px; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(255,255,255,0.8);}
        .header-title h2 { 
            font-size: 64px; margin: 0px 0 0 0; letter-spacing: 12px; font-weight: 900; 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-main), var(--gold-dark)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 5px 25px rgba(255, 196, 0, 0.6));
        }

        .content { display: flex; width: 94%; margin-top: 10px; z-index: 6; flex: 1; gap: 30px; }
        
        /* 人物影像 */
        .player-img-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 200px; position: relative; }
        .player-img-wrapper img { 
            max-width: 150%; max-height: 850px; object-fit: contain; z-index: 7;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.3)) drop-shadow(0 20px 40px rgba(0,0,0,1)); 
        }

        /* 琉璃金屬展示櫃 */
        .showcase { 
            flex: 1.2; background: rgba(5, 10, 20, 0.85); border: 2px solid var(--gold-main); 
            border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 0 40px rgba(255, 196, 0, 0.2); 
            display: flex; flex-direction: column; padding: 25px; gap: 15px; margin-bottom: 180px; 
            position: relative; backdrop-filter: blur(15px);
        }

        .showcase-row { 
            display: flex; flex-direction: column; border-radius: 8px; 
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0%, transparent 100%);
            border-left: 6px solid var(--gold-main); padding: 15px 10px; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .showcase-row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 196, 0, 0.4); padding-bottom: 5px; margin-bottom: 10px; }
        .configuration-tag { font-size: 22px; font-weight: 900; color: var(--gold-light); letter-spacing: 3px; text-shadow: 0 2px 8px #000; }
        
        /* 零件 - 大幅放大，且包含名稱 */
        .parts-container { display: flex; justify-content: space-around; align-items: flex-start; width: 100%; gap: 5px;}
        
        .part-slot { 
            width: 105px; /* 變大 */
            height: 120px; /* 增加高度給文字 */
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; position: relative; 
            gap: 5px;
        }
        .part-slot img { 
            height: 90px; /* 限制高度讓所有零件對齊 */
            width: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9)); z-index: 2; 
        }
        /* 零件名稱文字 */
        .part-name-display {
            font-size: 14px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px #000;
            text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: 1px;
        }

        /* 絕對強制靠右名牌 */
        .nameplate {
            position: absolute; right: 40px; left: auto; bottom: 40px; 
            width: 480px; height: 150px; border-radius: 12px; z-index: 20;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-dark) 100%);
            color: #000; box-shadow: 0 30px 60px rgba(0,0,0,1), inset 0 0 20px rgba(255,255,255,0.7);
            border: 4px solid var(--gold-light); transition: all 0.5s ease;
        }
        .nameplate-title { font-size: 18px; font-weight: 900; margin-bottom: 5px; letter-spacing: 4px; color: #332200;}
        .nameplate-rank { font-size: 52px; font-weight: 900; letter-spacing: 12px; line-height: 1; color: #000; text-shadow: 2px 3px 0px rgba(255,255,255,0.8);}
        .nameplate-name { font-size: 26px; font-weight: 900; margin-top: 8px; letter-spacing: 6px; color: #111;}

        /* 絕對強制靠左 LOGO */
        .custom-bottom-left-slot {
            position: absolute; left: 40px; right: auto; bottom: 40px; z-index: 30;
            width: 320px; height: 320px; display: flex; justify-content: center; align-items: center;
        }
        .custom-bottom-left-slot img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(0,0,0,1)); }
    </style>
</head>
<body>

    <div class="controls">
        <h2>究極榮耀大賽設定</h2>
        
        <label>大標題 (屆數): <input type="text" id="input-edition" value="第三屆" oninput="updateText('edition')"></label>
        
        <label>名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍</option>
                <option value="silver">🥈 亞軍</option>
                <option value="bronze">🥉 季軍</option>
            </select>
        </label>

        <label>選手姓名: <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')"></label>

        <!-- 🌌 中間帥氣底圖 -->
        <div class="file-upload-wrapper epic-bg">
            <h4>🌌 中間帥氣底圖</h4>
            <input type="file" accept="image/*" onchange="previewEpicBg(event)">
        </div>

        <div class="file-upload-wrapper">
            <h4>👤 選手去背照片</h4>
            <input type="file" accept="image/*" onchange="previewImage(event, 'player-img')">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 左下角專屬 LOGO</h4>
            <input type="file" accept="image/*" onchange="previewImage(event, 'custom-bottom-left-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載極致華麗圖片</button>
    </div>

    <div class="poster-container">
        <div id="poster">
            <!-- 內建特效底圖層 (會根據名次自動切換顏色) -->
            <div class="epic-bg-layer bg-gold-theme" id="epic-bg-layer"></div>
            <!-- 自訂上傳的帥氣底圖層 -->
            <div class="custom-bg-container" id="custom-bg-container"></div>
            <!-- 光芒射線特效 -->
            <div class="poster-fx-rays"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第三屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                </div>
                
                <div class="showcase" id="showcase-box">
                    <!-- 動態生成配置區 -->
                </div>
            </div>

            <!-- 名牌 -->
            <div class="nameplate" id="nameplate-box">
                <div class="nameplate-title">門陣仔 - 榮耀大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

            <!-- LOGO -->
            <div class="custom-bottom-left-slot" id="custom-bottom-left-slot">
                <img id="custom-bottom-left-img" src="" alt="" style="display: none;">
            </div>
        </div>
    </div>

    <script>
        // 渲染 3 組配置，每組 6 個零件 (包含文字輸入)
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                // 左側控制項 (加入文字 input)
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div>
                            <label>零件 1</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p1')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name1', this.value)">
                        </div>
                        <div>
                            <label>零件 2</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p2')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name2', this.value)">
                        </div>
                        <div>
                            <label>零件 3</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p3')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name3', this.value)">
                        </div>
                        <div>
                            <label>零件 4</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p4')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name4', this.value)">
                        </div>
                        <div>
                            <label>零件 5</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p5')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name5', this.value)">
                        </div>
                        <div>
                            <label>零件 6</label>
                            <input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p6')">
                            <input type="text" placeholder="輸入名稱" oninput="updatePartName('part-c${i}-name6', this.value)">
                        </div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                // 右側展示區 (加入名稱 div)
                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot">
                            <img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name1"></div>
                        </div>
                        <div class="part-slot">
                            <img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name2"></div>
                        </div>
                        <div class="part-slot">
                            <img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name3"></div>
                        </div>
                        <div class="part-slot">
                            <img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name4"></div>
                        </div>
                        <div class="part-slot">
                            <img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name5"></div>
                        </div>
                        <div class="part-slot">
                            <img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
                            <div class="part-name-display" id="part-c${i}-name6"></div>
                        </div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        // 更新零件名稱
        function updatePartName(targetId, value) {
            document.getElementById(targetId).innerText = value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            const epicBgLayer = document.getElementById('epic-bg-layer');
            const showcaseBox = document.getElementById('showcase-box');
            
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            document.getElementById('display-rank').innerText = rankText;

            // 移除舊背景主題
            epicBgLayer.classList.remove('bg-gold-theme', 'bg-silver-theme', 'bg-bronze-theme');

            // 根據名次切換：名牌顏色、展示櫃框色、背景特效
            if (rankSelect.value === 'gold') {
                epicBgLayer.classList.add('bg-gold-theme');
                nameplate.style.background = 'linear-gradient(180deg, var(--gold-light) 0%, var(--gold-main) 50%, var(--gold-dark) 100%)';
                nameplate.style.borderColor = 'var(--gold-light)';
                showcaseBox.style.borderColor = 'var(--gold-main)';
                document.querySelector('.header-title h2').style.background = 'linear-gradient(to bottom, var(--gold-light), var(--gold-main), var(--gold-dark))';
                document.querySelector('.header-title h2').style.webkitBackgroundClip = 'text';
            } else if (rankSelect.value === 'silver') {
                epicBgLayer.classList.add('bg-silver-theme');
                nameplate.style.background = 'linear-gradient(180deg, var(--silver-light) 0%, var(--silver-main) 50%, var(--silver-dark) 100%)';
                nameplate.style.borderColor = 'var(--silver-light)';
                showcaseBox.style.borderColor = 'var(--silver-main)';
                document.querySelector('.header-title h2').style.background = 'linear-gradient(to bottom, var(--silver-light), var(--silver-main), var(--silver-dark))';
                document.querySelector('.header-title h2').style.webkitBackgroundClip = 'text';
            } else {
                epicBgLayer.classList.add('bg-bronze-theme');
                // 季軍改為偏紅的赤銅色，明顯區隔
                nameplate.style.background = 'linear-gradient(180deg, var(--bronze-light) 0%, var(--bronze-main) 50%, var(--bronze-dark) 100%)';
                nameplate.style.borderColor = 'var(--bronze-light)';
                showcaseBox.style.borderColor = 'var(--bronze-main)';
                document.querySelector('.header-title h2').style.background = 'linear-gradient(to bottom, var(--bronze-light), var(--bronze-main), var(--bronze-dark))';
                document.querySelector('.header-title h2').style.webkitBackgroundClip = 'text';
            }
        }

        function previewEpicBg(event) {
            const customBgContainer = document.getElementById('custom-bg-container');
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                customBgContainer.style.backgroundImage = 'url(' + reader.result + ')';
            }
            reader.readAsDataURL(file);
        }

        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.substring(3).trim(); 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            html2canvas(poster, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#030712' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
