<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖產生器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/@imgly/background-removal.js"></script>

    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #b026ff;
            --gold: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            --silver: linear-gradient(135deg, #e0e0e0 0%, #9e9e9e 100%);
            --bronze: linear-gradient(135deg, #cd7f32 0%, #8b4513 100%);
            --bg-color: #050510;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        /* 左側控制面板 */
        .controls {
            flex: 1;
            background: #1e1e24;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 380px;
            overflow-y: auto;
            max-height: 95vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }
        .controls label { font-weight: bold; font-size: 13px; color: #ccc; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #2a2a35; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #444; border-radius: 8px; padding: 15px; background: #22222a; margin-bottom: 10px; }
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: #fff; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px;}
        
        /* 6零件上傳區的網格排列 */
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #1a1a20; padding: 8px; border-radius: 6px; border: 1px dashed #555;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 4px; color: #aaa;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }

        button { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 8px; cursor: pointer; font-size: 18px; transition: transform 0.2s, box-shadow 0.2s; margin-top: 10px;}
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        
        .tip-box { background: rgba(0, 229, 255, 0.1); border-left: 4px solid var(--neon-blue); padding: 10px; font-size: 12px; color: #ddd; line-height: 1.5; border-radius: 4px;}

        /* 右側海報預覽區 */
        .poster-container { flex: 3; display: flex; justify-content: center; align-items: flex-start; }
        
        /* 海報尺寸：加寬至 1000px，高度 1200px 確保 6 個零件排得下 */
        #poster { width: 1000px; height: 1100px; background: radial-gradient(circle at 50% 30%, #1a1a2e 0%, var(--bg-color) 100%); position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* 高科技背景特效 */
        .grid-bg { position: absolute; bottom: 0; width: 100%; height: 60%; background-image: linear-gradient(rgba(0, 229, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.1) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(1000px) rotateX(70deg); transform-origin: bottom; z-index: 1; opacity: 0.7;}
        .glow-orb-blue { position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 60%); left: -200px; top: 100px; z-index: 1; border-radius: 50%; pointer-events: none; }
        .glow-orb-purple { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(176, 38, 255, 0.15) 0%, transparent 60%); right: -100px; bottom: 200px; z-index: 1; border-radius: 50%; pointer-events: none; }

        /* 標題 (尊榮感) */
        .header-title { z-index: 2; text-align: center; margin-top: 50px; text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8); position: relative;}
        .header-title::after { content:''; position: absolute; bottom: -15px; left: 20%; width: 60%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);}
        .header-title h1 { font-size: 38px; margin: 0; letter-spacing: 4px; font-weight: 300; }
        .header-title h2 { font-size: 48px; margin: 10px 0 0 0; letter-spacing: 8px; font-weight: 900; background: linear-gradient(to bottom, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}

        /* 主要內容佈局 (左人物、右零件) */
        .content { display: flex; width: 92%; margin-top: 50px; z-index: 2; flex: 1; gap: 30px; }
        
        .player-img-wrapper { flex: 1; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 150px; position: relative; z-index: 3; }
        /* 人物加上科技感光暈與強烈陰影 */
        .player-img-wrapper img { max-width: 130%; max-height: 800px; object-fit: contain; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.9)); z-index: 2;}

        /* 玻璃透視風 展示櫃 */
        .showcase { 
            flex: 1.3; 
            background: rgba(20, 20, 30, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 25px; gap: 20px; margin-bottom: 160px; z-index: 3; 
        }

        .showcase-row { 
            display: flex; flex-direction: column; border-radius: 12px; 
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.4) 100%); 
            border: 1px solid rgba(255, 255, 255, 0.08); padding: 15px; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .showcase-row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 8px; margin-bottom: 12px; }
        .configuration-tag { font-size: 16px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        
        /* 6個零件的橫向排列 */
        .parts-container { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px;}
        
        /* 精緻的零件底座 */
        .part-slot { 
            width: 70px; height: 70px; 
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.6) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center; position: relative; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
        }
        /* 底座高光特效 */
        .part-slot::after { content:''; position: absolute; top: 0; left: 10%; width: 80%; height: 30%; background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%); border-radius: 50%; pointer-events: none;}
        .part-slot img { max-height: 85%; max-width: 85%; object-fit: contain; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.8)); z-index: 2; }

        /* 霸氣立體金屬名牌 */
        .nameplate {
            position: absolute;
            bottom: 40px;
            width: 480px;
            height: 140px;
            border-radius: 12px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #111;
            overflow: hidden; 
        }

        .nameplate::before, .nameplate::after, 
        .nameplate-screws::before, .nameplate-screws::after {
            content: ''; position: absolute; width: 14px; height: 14px; background: #ddd; border-radius: 50%;
            box-shadow: inset 2px 2px 5px #fff, inset -2px -2px 5px #888, 2px 2px 4px rgba(0,0,0,0.6);
        }
        .nameplate::before { top: 12px; left: 15px; }
        .nameplate::after { top: 12px; right: 15px; }
        .nameplate-screws { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2;}
        .nameplate-screws::before { bottom: 12px; left: 15px; }
        .nameplate-screws::after { bottom: 12px; right: 15px; }

        /* 名牌上的反光特效 */
        .nameplate-shine { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transform: skewX(-20deg); pointer-events: none; z-index: 1;}

        .nameplate-title { font-size: 18px; font-weight: 900; margin-bottom: 2px; letter-spacing: 2px; opacity: 0.8; z-index: 2;}
        .nameplate-rank { font-size: 46px; font-weight: 900; letter-spacing: 10px; line-height: 1.1; text-shadow: 0 2px 4px rgba(255,255,255,0.5); z-index: 2;}
        .nameplate-name { font-size: 26px; font-weight: 900; margin-top: 4px; letter-spacing: 4px; z-index: 2;}

        /* 加載指示器 */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; color: var(--neon-blue); font-size: 24px; font-weight: bold; flex-direction: column; gap: 15px; }

        /* 動態顏色樣式：金、銀、銅 */
        .rank-gold { background: var(--gold); border: 2px solid #fffdf0; box-shadow: 0 15px 35px rgba(255, 215, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.5); }
        .rank-silver { background: var(--silver); border: 2px solid #ffffff; box-shadow: 0 15px 35px rgba(192, 192, 192, 0.4), inset 0 0 20px rgba(255,255,255,0.5); }
        .rank-bronze { background: var(--bronze); border: 2px solid #ffeedd; box-shadow: 0 15px 35px rgba(205, 127, 50, 0.4), inset 0 0 20px rgba(255,255,255,0.3); }
        
        .showcase-gold { border-color: rgba(255, 215, 0, 0.5); box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 30px rgba(255, 215, 0, 0.15), inset 0 0 20px rgba(255, 215, 0, 0.05); }
        .showcase-silver { border-color: rgba(192, 192, 192, 0.5); box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 30px rgba(192, 192, 192, 0.15), inset 0 0 20px rgba(192, 192, 192, 0.05); }
        .showcase-bronze { border-color: rgba(205, 127, 50, 0.5); box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 30px rgba(205, 127, 50, 0.15), inset 0 0 20px rgba(205, 127, 50, 0.05); }

    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">
        <div>照片處理中，請稍候...</div>
        <div style="font-size: 14px; font-weight: normal; color: #aaa;">（若失敗出現黑底，建議使用 iPad 相簿長按拷貝去背圖上傳）</div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <h2>榮耀圖設定</h2>
        
        <div class="tip-box">
            💡 <b>去背防崩潰密技：</b><br>
            若上傳照片去背失敗出現黑框，請直接到 iPad「照片」APP，長按人物點擊「拷貝」，貼到備忘錄存成圖檔後，再上傳該圖檔，保證完美去背無黑邊！
        </div>

        <label>大標題 (屆數): <input type="text" id="input-edition" value="第一屆" oninput="updateText('edition')"></label>
        
        <label>名次配置:
            <select id="input-rank" onchange="updateRank()">
                <option value="gold">🏆 冠軍 (金色風格)</option>
                <option value="silver">🥈 亞軍 (銀色風格)</option>
                <option value="bronze">🥉 季軍 (銅色風格)</option>
            </select>
        </label>

        <label>選手姓名: <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')"></label>

        <div class="file-upload-wrapper" style="background: rgba(0,229,255,0.1); border-color: var(--neon-blue);">
            <h4>👤 選手照片</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'player-img', true)">
        </div>

        <!-- 3組配置，每組6個零件的上傳區 -->
        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載為高畫質圖片</button>
    </div>

    <!-- 海報預覽區 -->
    <div class="poster-container">
        <div id="poster">
            <div class="grid-bg"></div>
            <div class="glow-orb-blue"></div>
            <div class="glow-orb-purple"></div>
            
            <div class="header-title">
                <h1>2026 鬥陣仔 <span id="display-edition">第一屆</span></h1>
                <h2>陀螺戰鬥大賽 榮耀</h2>
            </div>

            <div class="content">
                <div class="player-img-wrapper">
                    <!-- 預設佔位圖 -->
                    <img id="player-img" src="https://via.placeholder.com/600x800/222/555.png?text=Player" alt="選手">
                </div>
                
                <div class="showcase showcase-gold" id="showcase-box">
                    <!-- 動態生成3組，每組6個零件的展示區 -->
                </div>
            </div>

            <!-- 立體金屬名牌 -->
            <div class="nameplate rank-gold" id="nameplate-box">
                <div class="nameplate-shine"></div>
                <div class="nameplate-screws"></div>
                <div class="nameplate-title">鬥陣仔 大會勝者</div>
                <div class="nameplate-rank" id="display-rank">冠軍</div>
                <div class="nameplate-name" id="display-name">郭嘉弘</div>
            </div>

        </div>
    </div>

    <script>
        // 初始化 3組配置，每組 6個零件
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                // 建立上傳區 (雙排網格設計)
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>零件 1</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p1')"></div>
                        <div><label>零件 2</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p2')"></div>
                        <div><label>零件 3</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p3')"></div>
                        <div><label>零件 4</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p4')"></div>
                        <div><label>零件 5</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p5')"></div>
                        <div><label>零件 6</label><input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'part-c${i}-p6')"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                // 建立展示區 (一排 6 個底座)
                const showcaseHtml = `
                <div class="showcase-row">
                    <div class="showcase-row-header"><span class="configuration-tag">配置 ${i}</span></div>
                    <div class="parts-container">
                        <div class="part-slot"><img id="part-c${i}-p1" src="https://via.placeholder.com/80/111/444.png?text=1" alt="P1"></div>
                        <div class="part-slot"><img id="part-c${i}-p2" src="https://via.placeholder.com/80/111/444.png?text=2" alt="P2"></div>
                        <div class="part-slot"><img id="part-c${i}-p3" src="https://via.placeholder.com/80/111/444.png?text=3" alt="P3"></div>
                        <div class="part-slot"><img id="part-c${i}-p4" src="https://via.placeholder.com/80/111/444.png?text=4" alt="P4"></div>
                        <div class="part-slot"><img id="part-c${i}-p5" src="https://via.placeholder.com/80/111/444.png?text=5" alt="P5"></div>
                        <div class="part-slot"><img id="part-c${i}-p6" src="https://via.placeholder.com/80/111/444.png?text=6" alt="P6"></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        function updateText(type) {
            if(type === 'edition') document.getElementById('display-edition').innerText = document.getElementById('input-edition').value;
            if(type === 'name') document.getElementById('display-name').innerText = document.getElementById('input-name').value;
        }

        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const nameplate = document.getElementById('nameplate-box');
            const showcase = document.getElementById('showcase-box');
            
            nameplate.className = "nameplate";
            showcase.className = "showcase";

            // 抓取選項的實際 value (gold, silver, bronze)
            nameplate.classList.add(`rank-${rankSelect.value}`);
            showcase.classList.add(`showcase-${rankSelect.value}`);
            
            // 抓取文字去掉前面的 Emoji
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.split(' ')[1]; 
            document.getElementById('display-rank').innerText = rankText;
        }

        // 壓縮圖片防崩潰
        function compressImage(file, maxWidth) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/png' }));
                        }, 'image/png');
                    };
                };
            });
        }

        async function previewImageAutoBg(event, targetId, isPlayer = false) {
            const loadingOverlay = document.getElementById('loading-overlay');
            const output = document.getElementById(targetId);
            let file = event.target.files[0];

            if (!file) return;

            loadingOverlay.style.display = 'flex';
            
            try {
                // 壓縮圖片降低記憶體負載
                let processFile = file;
                if (file.size > 800 * 1024) { 
                    processFile = await compressImage(file, isPlayer ? 800 : 400);
                }

                const imageBlob = await imglyRemoveBackground(processFile);
                const url = URL.createObjectURL(imageBlob);
                output.src = url;
            } catch (error) {
                console.error("圖片處理失敗:", error);
                // 失敗時使用原圖
                const reader = new FileReader();
                reader.onload = () => output.src = reader.result;
                reader.readAsDataURL(file);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function downloadImage() {
            const poster = document.getElementById('poster');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rawText = rankSelect.options[rankSelect.selectedIndex].text;
            let rankText = rawText.split(' ')[1]; 
            const edition = document.getElementById('input-edition').value;
            const fileName = `鬥陣仔_${edition}_${rankText}_${nameSelect.value}.png`;

            // 加入名牌反光特效動畫的瞬間截圖處理
            const shine = document.querySelector('.nameplate-shine');
            shine.style.display = 'none'; // 截圖時隱藏反光避免奇怪的白條

            html2canvas(poster, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#050510' // 指定背景色避免透明問題
            }).then(canvas => {
                shine.style.display = 'block'; // 恢復反光
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 0.9);
                link.click();
            });
        }
    </script>
</body>
</html>
