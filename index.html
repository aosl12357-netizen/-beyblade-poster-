<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陀螺大賽 榮耀配置圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@imgly/background-removal@1.4.3/dist/browser/@imgly/background-removal.js"></script>

    <style>
        :root {
            --bg-dark: #12141a;
            --panel-bg: #1a1d24;
            --gold-light: #fef08a;
            --gold-main: #d4af37; /* 殿堂金 */
            --gold-dark: #997a00;
            --text-gold: #fde047;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #000;
            color: white;
            display: flex;
            gap: 20px;
            padding: 20px;
            margin: 0;
            user-select: none;
            height: 100vh;
            box-sizing: border-box;
        }

        /* 👑 左側控制面板 */
        .controls {
            flex: 1; 
            background: var(--bg-dark); 
            padding: 20px; 
            border-radius: 8px;
            display: flex; flex-direction: column; gap: 15px; 
            max-width: 350px;
            overflow-y: auto; 
            border: 2px solid var(--gold-main);
            outline: 1px solid var(--gold-main);
            outline-offset: -6px;
        }

        .controls h2 { margin-top: 0; font-size: 22px; text-align: center; color: var(--gold-main); border-bottom: 1px solid var(--gold-dark); padding-bottom: 10px;}
        .controls label { font-weight: bold; font-size: 14px; color: #ccc; display: block; margin-bottom: 5px; }
        .controls input[type="text"], .controls select { width: 100%; padding: 10px; background: #222; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px;}
        
        .file-upload-wrapper { border: 1px solid #444; border-radius: 6px; padding: 15px; background: #1a1a1a; margin-bottom: 10px; }
        .file-upload-wrapper h4 { margin: 0 0 10px 0; color: var(--gold-light); font-size: 16px; border-bottom: 1px dashed #555; padding-bottom: 5px;}
        
        /* 左側配置 3x2 上傳網格 */
        .parts-grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .parts-grid-inputs div { background: #111; padding: 8px; border-radius: 4px; border: 1px solid #333;}
        .parts-grid-inputs label { font-size: 12px; margin-bottom: 4px; color: #888;}
        .parts-grid-inputs input[type="file"] { width: 100%; font-size: 11px; }

        button { background: linear-gradient(to bottom, var(--gold-light), var(--gold-main)); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.2s;}
        button:hover { filter: brightness(1.1); }

        /* 👑 右側預覽/下載畫布 (包含左海報+右配置) */
        .preview-container {
            flex: 3;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        #export-canvas {
            display: flex;
            gap: 20px;
            background-color: #000; /* 畫布純黑底 */
            padding: 20px;
        }

        /* 🎨 面板共用華麗邊框 (雙層金線) */
        .ornate-panel {
            background: var(--panel-bg);
            position: relative;
            border: 2px solid var(--gold-main);
            outline: 1px solid var(--gold-main);
            outline-offset: -8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        /* 面板內的高級星空/暗角背景 */
        .ornate-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%),
                        url('https://www.transparenttextures.com/patterns/stardust.png'); /* 微弱星塵質感 */
            opacity: 0.3; pointer-events: none; z-index: 1;
        }

        /* 🖼️ 左半部：人物海報區 */
        .poster-section {
            width: 500px;
            height: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        /* 頂部姓名 */
        .top-name {
            font-size: 32px;
            font-weight: 900;
            color: var(--text-gold);
            letter-spacing: 5px;
            border-bottom: 2px solid var(--gold-dark);
            padding-bottom: 10px;
            margin-bottom: 20px;
            z-index: 2;
            width: 80%;
            text-align: center;
        }

        /* 人物影像 */
        .player-img-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 讓人像靠下 */
            z-index: 2;
            position: relative;
        }
        .player-img-container img {
            max-width: 130%;
            max-height: 500px;
            object-fit: contain;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.9));
        }

        /* 標題與名次 (極簡化) */
        .rank-title-box {
            z-index: 2;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .rank-title-box h3 {
            font-size: 20px; color: #ccc; margin: 0 0 5px 0; letter-spacing: 2px; font-weight: normal;
        }
        .rank-title-box h1 {
            font-size: 55px; margin: 0; color: var(--text-gold); letter-spacing: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* 底部 LOGO 槽 */
        .logo-slot {
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .logo-slot img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* ⚙️ 右半部：零件配置陳列區 */
        .parts-section {
            width: 400px;
            height: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .parts-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-gold);
            letter-spacing: 3px;
            margin-bottom: 30px;
            z-index: 2;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        /* 配置區塊 1~3 */
        .config-block {
            width: 100%;
            margin-bottom: 25px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .config-header {
            font-size: 16px;
            color: #ddd;
            margin-bottom: 10px;
            letter-spacing: 2px;
            position: relative;
        }
        .config-header::before, .config-header::after {
            content: ''; position: absolute; top: 50%; width: 50px; height: 1px; background: var(--gold-dark);
        }
        .config-header::before { right: 100%; margin-right: 15px; }
        .config-header::after { left: 100%; margin-left: 15px; }

        /* 無框 3x2 零件網格 */
        .parts-grid-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px 20px;
            width: 90%;
            justify-items: center;
            align-items: center;
        }

        .part-item {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 無邊框，純圖片展示 */
        .part-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
        }

        /* 載入遮罩 */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100; color: var(--gold-main); font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loading-overlay">魔法去背運算中...</div>

    <div class="controls">
        <h2>榮耀海報生成控制</h2>
        
        <label>選手姓名:</label>
        <input type="text" id="input-name" value="郭嘉弘" oninput="updateText('name')">
        
        <label>名次配置 (自動切換文字與顏色):</label>
        <select id="input-rank" onchange="updateRank()">
            <option value="gold">🏆 冠軍</option>
            <option value="silver">🥈 亞軍</option>
            <option value="bronze">🥉 季軍</option>
        </select>

        <div class="file-upload-wrapper">
            <h4>👤 選手人像照片 (自動去背)</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'player-img', true)">
        </div>

        <div class="file-upload-wrapper">
            <h4>✨ 底部專屬 LOGO (自動去背)</h4>
            <input type="file" accept="image/*" onchange="previewImageAutoBg(event, 'custom-logo-img')">
        </div>

        <div id="upload-sections"></div>

        <button onclick="downloadImage()">⬇️ 下載殿堂級海報</button>
    </div>

    <div class="preview-container">
        <div id="export-canvas">
            
            <div class="ornate-panel poster-section" id="poster-panel">
                <div class="top-name" id="display-name-top">郭嘉弘</div>
                
                <div class="player-img-container">
                    <img id="player-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="選手">
                </div>

                <div class="rank-title-box">
                    <h3>門陣仔 大會勝者</h3>
                    <h1 id="display-rank">冠軍</h1>
                </div>

                <div class="logo-slot">
                    <img id="custom-logo-img" src="" alt="" style="display: none;">
                </div>
            </div>

            <div class="ornate-panel parts-section">
                <div class="parts-title">陀螺配置陳列</div>
                <div id="showcase-box" style="width: 100%;">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // 初始化 1~3 組配置 (控制面板 + 展示區)
        function initConfigurations() {
            const uploadSections = document.getElementById('upload-sections');
            const showcaseBox = document.getElementById('showcase-box');
            
            for (let i = 1; i <= 3; i++) {
                // 左側控制面板的 6 個上傳鈕
                const uploadHtml = `
                <div class="file-upload-wrapper">
                    <h4>⚙️ 配置 ${i}</h4>
                    <div class="parts-grid-inputs">
                        <div><label>零件 1</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p1')"></div>
                        <div><label>零件 2</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p2')"></div>
                        <div><label>零件 3</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p3')"></div>
                        <div><label>零件 4</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p4')"></div>
                        <div><label>零件 5</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p5')"></div>
                        <div><label>零件 6</label><input type="file" accept="image/*" onchange="previewImage(event, 'part-c${i}-p6')"></div>
                    </div>
                </div>`;
                uploadSections.insertAdjacentHTML('beforeend', uploadHtml);

                // 右側展示區的 3x2 無框網格
                const showcaseHtml = `
                <div class="config-block">
                    <div class="config-header">配置 ${i}</div>
                    <div class="parts-grid-display">
                        <div class="part-item"><img id="part-c${i}-p1" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-item"><img id="part-c${i}-p2" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-item"><img id="part-c${i}-p3" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-item"><img id="part-c${i}-p4" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-item"><img id="part-c${i}-p5" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                        <div class="part-item"><img id="part-c${i}-p6" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt=""></div>
                    </div>
                </div>`;
                showcaseBox.insertAdjacentHTML('beforeend', showcaseHtml);
            }
        }
        
        initConfigurations();

        // 更新姓名
        function updateText(type) {
            if(type === 'name') {
                document.getElementById('display-name-top').innerText = document.getElementById('input-name').value;
            }
        }

        // 更新名次與字體顏色
        function updateRank() {
            const rankSelect = document.getElementById('input-rank');
            const displayRank = document.getElementById('display-rank');
            const root = document.documentElement;
            
            // 擷取選項文字 (去掉 Emoji)
            let rankText = rankSelect.options[rankSelect.selectedIndex].text.substring(3).trim(); 
            displayRank.innerText = rankText;

            // 根據名次改變整體色調
            if (rankSelect.value === 'gold') {
                root.style.setProperty('--text-gold', '#fde047');
                displayRank.style.color = '#fde047';
            } else if (rankSelect.value === 'silver') {
                root.style.setProperty('--text-gold', '#e2e8f0');
                displayRank.style.color = '#e2e8f0';
            } else {
                root.style.setProperty('--text-gold', '#fdb8a3');
                displayRank.style.color = '#fdb8a3';
            }
        }

        // 圖片壓縮防崩潰
        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                        } else {
                            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/png' }));
                        }, 'image/png');
                    };
                };
            });
        }

        // AI 強制去背 (選手 & LOGO)
        async function previewImageAutoBg(event, targetId, isPlayer = false) {
            const loadingOverlay = document.getElementById('loading-overlay');
            const output = document.getElementById(targetId);
            let file = event.target.files[0];

            if (!file) return;

            loadingOverlay.style.display = 'flex';
            
            try {
                if (isPlayer && file.size > 1024 * 1024) file = await compressImage(file, 800, 800);
                const imageBlob = await imglyRemoveBackground(file);
                const url = URL.createObjectURL(imageBlob);
                output.src = url;
                output.style.display = 'block';
            } catch (error) {
                console.error("去背失敗，載入原圖:", error);
                const reader = new FileReader();
                reader.onload = () => { output.src = reader.result; output.style.display = 'block'; };
                reader.readAsDataURL(file);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        // 零件圖片預覽 (純淨讀取)
        function previewImage(event, targetId) {
            const output = document.getElementById(targetId);
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        // 下載圖片 (擷取整個 canvas)
        function downloadImage() {
            const exportCanvas = document.getElementById('export-canvas');
            const nameSelect = document.getElementById('input-name');
            const rankSelect = document.getElementById('input-rank');
            let rankText = rankSelect.options[rankSelect.selectedIndex].text.substring(3).trim(); 
            const fileName = `鬥陣仔_${rankText}_${nameSelect.value}.png`;

            html2canvas(exportCanvas, {
                scale: 2, 
                useCORS: true, 
                backgroundColor: '#000000' 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = fileName;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
            });
        }
    </script>
</body>
</html>
